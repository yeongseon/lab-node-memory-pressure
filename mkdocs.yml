site_name: "Node.js Memory Pressure Lab"
site_description: "Experiment: Does Linux kernel page reclaim cause CPU increases under memory pressure on Azure App Service?"
repo_url: "https://github.com/yeongseon/lab-node-memory-pressure"
repo_name: "yeongseon/lab-node-memory-pressure"

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          nav:
            - 홈: index.md
            - 배경지식: background.md
            - 가설: hypothesis.md
            - 실험 결과: experiment-log.md
            - 실행 가이드: runbook.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Background: background.md
  - Hypothesis: hypothesis.md
  - Experiment Results: experiment-log.md
  - Runbook: runbook.md
